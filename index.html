<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GigHub Kolkata | Gamified Job Marketplace</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glassmorphism {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        @keyframes pulse-neon {
            0%, 100% { text-shadow: 0 0 4px #ef4444, 0 0 12px #ef4444; opacity: 1; }
            50% { text-shadow: 0 0 1px #ef4444, 0 0 3px #ef4444; opacity: 0.75; }
        }
        .animate-sos-neon {
            animation: pulse-neon 1.2s infinite ease-in-out;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }
        .swipe-card {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .swipe-card:active { cursor: grabbing; }
    </style>
</head>
<body class="h-full font-sans antialiased overflow-x-hidden relative selection:bg-indigo-500 selection:text-white">

    <div class="absolute top-10 left-10 w-72 h-72 bg-purple-600/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

    <div id="app-root" class="min-h-screen w-full flex flex-col items-center justify-center p-4">
        
        <div id="screen-auth" class="w-full max-w-md glassmorphism p-8 rounded-3xl shadow-2xl z-10 transition-all duration-500">
            <div class="text-center mb-8">
                <div class="inline-flex p-3 rounded-2xl bg-indigo-600/20 text-indigo-400 mb-3 border border-indigo-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">GIGHUB KOLKATA</h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Gamified Micro-Gig Engine</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 tracking-wider">Email Address</label>
                    <input type="email" id="auth-email" value="student@jadavpur.edu" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 transition-colors" placeholder="yourname@college.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5 tracking-wider">Password</label>
                    <input type="password" id="auth-password" value="gighubpass123" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 text-slate-200 transition-colors" placeholder="••••••••">
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <label class="relative flex flex-col p-4 bg-slate-900/40 border-2 border-slate-700 rounded-xl cursor-pointer select-none group has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-600/10 transition-all">
                        <input type="radio" name="auth-role" value="student" checked class="sr-only">
                        <span class="text-sm font-bold text-slate-200">Find Work</span>
                        <span class="text-[10px] text-slate-400 mt-1">Kolkata Student</span>
                    </label>
                    <label class="relative flex flex-col p-4 bg-slate-900/40 border-2 border-slate-700 rounded-xl cursor-pointer select-none group has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-600/10 transition-all">
                        <input type="radio" name="auth-role" value="business" class="sr-only">
                        <span class="text-sm font-bold text-slate-200">Hire Instantly</span>
                        <span class="text-[10px] text-slate-400 mt-1">Local Business</span>
                    </label>
                </div>

                <button id="btn-login" class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-all transform active:scale-[0.98] mt-4 text-sm tracking-wide">
                    Enter the Marketplace
                </button>
                <p class="text-center text-xs text-slate-500 mt-2">Secured via Supabase Infrastructure</p>
            </div>
        </div>

        <div id="screen-onboarding" class="w-full max-w-md glassmorphism p-8 rounded-3xl shadow-2xl z-10 hidden transition-all duration-500">
            <h2 class="text-2xl font-extrabold text-white mb-1">Setup Your Profile</h2>
            <p class="text-xs text-slate-400 mb-6">Let's fine-tune your hyper-local visibility preferences.</p>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Your Full Name / Business Title</label>
                    <input type="text" id="onboard-name" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="e.g., Arjun Chakraborty / Roastery Cafe">
                </div>

                <div id="onboard-student-fields" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">College / University</label>
                        <select id="onboard-college" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                            <option value="Jadavpur University">Jadavpur University (JU)</option>
                            <option value="Calcutta University">Calcutta University (CU)</option>
                            <option value="St. Xavier's College">St. Xavier's College</option>
                            <option value="Presidency University">Presidency University</option>
                            <option value="Asutosh College">Asutosh College</option>
                        </select>
                    </div>
                </div>

                <div id="onboard-business-fields" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Business Category</label>
                        <input type="text" id="onboard-biztype" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="e.g., Cafe, Bookstore, Event Agency">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1.5">Primary Operations Hub (Kolkata)</label>
                    <select id="onboard-location" class="w-full bg-slate-900/60 border border-slate-700/60 rounded-xl px-4 py-3 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                        <option value="Park Street">Park Street Area</option>
                        <option value="Salt Lake Sector V">Salt Lake Sector V</option>
                        <option value="Gariahat">Gariahat Junction</option>
                        <option value="College Street">College Street (Boi Para)</option>
                        <option value="New Town">New Town Axis</option>
                    </select>
                </div>

                <button id="btn-save-onboard" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-all text-sm tracking-wide mt-2">
                    Initialize Core Dashboard Engine
                </button>
            </div>
        </div>

        <div id="screen-dashboard" class="w-full max-w-md flex flex-col h-[780px] max-h-[92vh] glassmorphism rounded-3xl shadow-2xl z-10 hidden overflow-hidden transition-all duration-500">
            <div class="p-4 border-b border-slate-800/80 flex items-center justify-between bg-slate-900/40">
                <div class="flex items-center space-x-3">
                    <div id="user-avatar-initial" class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center font-black text-sm text-white shadow-md shadow-indigo-500/20">U</div>
                    <div>
                        <h3 id="dash-user-name" class="text-sm font-bold text-white leading-tight">Loading Profile...</h3>
                        <div class="flex items-center space-x-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span id="dash-user-meta" class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">JU • 5.0★</span>
                        </div>
                    </div>
                </div>

                <button id="toggle-mode-btn" class="px-3 py-1.5 rounded-xl text-xs font-black tracking-wide transition-all bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-md active:scale-95">
                    Work Mode
                </button>
            </div>

            <div class="px-4 py-2 bg-slate-950/60 border-b border-slate-800/50 flex justify-between items-center text-xs">
                <div class="flex items-center space-x-1">
                    <span class="text-amber-400 font-bold">⚡ XP Engine:</span>
                    <span id="dash-xp-display" class="font-mono text-slate-200 font-bold">100 XP</span>
                </div>
                <div id="dash-badge-strip" class="flex items-center space-x-2">
                    </div>
            </div>

            <div id="card-deck-container" class="flex-1 relative flex items-center justify-center p-6 bg-slate-950/10 overflow-hidden">
                </div>

            <div class="p-4 bg-slate-900/40 border-t border-slate-800/80 grid grid-cols-2 gap-3">
                <button id="action-left" class="bg-slate-900 hover:bg-red-950/30 border border-slate-800 hover:border-red-500/40 text-slate-400 hover:text-red-400 py-3 rounded-xl font-bold transition-all text-xs flex items-center justify-center space-x-1.5">
                    <span>❌ Pass / Skip</span>
                </button>
                <button id="action-right" class="bg-indigo-600/10 hover:bg-indigo-600 border border-indigo-500/30 hover:border-indigo-500 text-indigo-400 hover:text-white py-3 rounded-xl font-bold transition-all text-xs flex items-center justify-center space-x-1.5 shadow-lg">
                    <span>⚡ Swash / Apply</span>
                </button>
            </div>
        </div>

        <div id="modal-match" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
            <div class="w-full max-w-md glass-card rounded-3xl p-6 text-center transform scale-95 transition-all duration-300 flex flex-col max-h-[80vh]">
                
                <div class="mb-4">
                    <div class="inline-flex p-3 rounded-full bg-pink-500/20 text-pink-500 mb-2 animate-bounce">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black bg-gradient-to-r from-pink-400 via-purple-400 to-indigo-400 bg-clip-text text-transparent">MUTUAL MATCH IT!</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Accountability alignment verified securely.</p>
                </div>

                <div id="chat-messages-container" class="flex-1 min-h-[240px] bg-slate-950/60 rounded-2xl border border-slate-800/80 p-4 text-left overflow-y-auto space-y-3 flex flex-col text-xs">
                    </div>

                <div class="mt-4 flex space-x-2">
                    <input type="text" id="chat-input-field" class="flex-1 bg-slate-900 border border-slate-700/80 rounded-xl px-4 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-indigo-500" placeholder="Type instant handshake message...">
                    <button id="btn-send-message" class="bg-indigo-600 hover:bg-indigo-700 px-4 rounded-xl text-xs font-bold transition-colors">Send</button>
                </div>

                <button id="btn-close-match" class="mt-4 text-[11px] font-bold text-slate-500 hover:text-slate-300 tracking-wider uppercase transition-colors py-1">
                    Return to Swiper Arena
                </button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
